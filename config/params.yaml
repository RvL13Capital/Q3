kelly:
  fraction: 0.25          # fractional Kelly multiplier
  max_position: 0.08      # 8% hard cap per stock
  max_bucket: 0.35        # 35% hard cap per megatrend bucket
  min_position: 0.02      # skip if Kelly weight < 2%
  cash_reserve: 0.10      # always keep at least 10% cash
  # Market impact parameters (eq 12: c · σ · |f−f_old|^1.5 · √(W/V))
  aum_eur: 50_000_000     # current AUM in EUR — set to actual fund size
  impact_scaling: 1.0     # universal impact constant c ≈ 1.0 (Bouchaud et al.)
  # Epistemic risk parameters (eq 12: λ · σ_epist · f  +  ½ · σ²_epist · f²)
  # σ_epist proxy = 1 − composite_confidence  (Phase 3: replace with Deep Ensemble σ_epist)
  lambda_epist: 0.25        # λ: linear epistemic penalty coefficient (calibrated to 1−confidence proxy; replace with true scale when Deep Ensembles land)
  not_aus_confidence: 0.20  # composite_confidence < this → Not-Aus → f* = 0 instantly
  # Almgren-Chriss participation-rate penalty (endogenous slippage):
  # η · σ · √(f·fraction·AUM/ADV) penalises steady-state participation rate,
  # causing the optimizer to organically avoid illiquid names before hitting
  # the hard 10%/25% ADV boundaries.  0.0 = disabled (conservative default).
  eta_participation: 0.50   # η: participation impact coefficient (calibrate to fund's execution quality)

signals:
  # Composite formula is multiplicative: X_E × X_P × (1 - X_C)
  # Thresholds are on the [0,1] product, so are lower than old additive thresholds.
  entry_threshold: 0.30         # composite must exceed this to trigger entry
  crowding_entry_max: 0.40      # only enter if X_C < this
  crowding_exit_threshold: 0.75 # exit if X_C rises above this
  quality_exit_threshold: 0.25  # exit if X_P falls below this (post-gate)
  composite_decay_pct: 0.20     # exit if composite decays > 20% from entry value
  min_composite_confidence: 0.40  # below this → insufficient data → excluded

  crowding:
    # CSD (Critical Slowing Down) parameters — eq 6: X_C = clamp(ω₁·Δρ₁ + ω₂·Δ(λ_max/Σλ) [+ ω₃·trends + ω₄·etf_corr + ω₅·short_int])
    autocorr_window: 30          # rolling days for current lag-1 autocorrelation
    autocorr_baseline: 120       # days for baseline autocorrelation (delta reference)
    absorption_window: 60        # days for correlation matrix eigenvalue computation
    csd_omega1: 0.5              # weight for Δρ₁ (lag-1 autocorr delta)
    csd_omega2: 0.5              # weight for Δ(λ_max/Σλ) (absorption ratio delta)
    # Google Trends third component — only applied when trends data is present in DB.
    # When absent the two-component formula above is used unchanged (omega1/omega2 renorm to 1.0).
    csd_omega3: 0.20             # weight for Google Trends crowding proxy
    trends_window_recent: 30     # trailing days for "current" Trends average
    trends_window_baseline: 90   # trailing days for baseline Trends comparison
    # Sector ETF rolling correlation — only applied when ETF price data is present.
    # High correlation between stock and sector ETF signals herd co-movement.
    csd_omega_etf: 0.15          # weight for ETF rolling correlation sub-score
    etf_corr_window: 60          # days for rolling Pearson correlation
    etf_corr_baseline: 120       # days for baseline correlation (delta reference)
    etf_corr_max_delta: 0.30     # correlation increase treated as fully crowded (score=1.0)
    # Short interest — only applied when short_interest table has data for the ticker.
    # Extreme short-interest spikes signal crowded positioning (both sides).
    csd_omega_short: 0.10        # weight for short-interest sub-score
    short_interest_window: 30    # days to average short_pct_float for current reading
    short_interest_high: 0.25    # pct_float threshold → score = 1.0 (fully crowded)
    short_interest_low: 0.05     # pct_float threshold → score = 0.0 (no signal)

  quality:
    roic_wacc_spread_min: 0.0    # hard gate: ROIC ≤ WACC → X_P = 0
    roic_wacc_spread_max: +0.20  # normalization ceiling for raw spread (eq 5 primary scale)
    margin_snr_min: 2.0
    margin_snr_max: 10.0
    # ∂GM/∂PPI: OLS slope of annual Δgross_margin vs annual PPI (both decimal)
    # e.g. +0.5 → each 1pp PPI rise → 0.5pp margin expansion (anti-fragile)
    # gamma: steepness of the exp(γ·max(0, slope)) convexity multiplier (eq 5)
    # gamma=2 → slope=0.5 → exp(1.0)=2.72× amplification for strong pricing power
    gamma: 2.0
    convexity_max: +0.50         # slope beyond this is treated as fully anti-fragile
    lookback_years: 5

physical:
  # EROEI logistic damper (eq 4): X_E = 1 / (1 + exp(κ · (ECS_proxy − ECS_crit)))
  # ECS_proxy = percentile rank of FRED PPIENG over trailing lookback window [0, 1]
  # κ = 10.0 calibrated for 0–1 percentile scale (spec uses 50 for raw ECS %)
  eroei_kappa: 10.0
  ecs_crit_percentile: 0.70    # 70th pct = structural energy cost headwind
  ecs_lookback_months: 60      # 5-year rolling window for percentile
  us_energy_ppi_series: "US_PPIENG"  # FRED PPIENG level index
  bucket_fallback_confidence: 0.40   # reported when PPIENG unavailable and bucket approximation used

return_estimation:
  equity_risk_premium: 0.05   # added on top of regional risk-free rate for WACC
  # μ_base = rf + θ × composite  (eq 7: rf + θ·X_P × X_E × (1-X_C))
  # composite ∈ [0,1]; θ calibrated so composite=0.50 → ~15% above rf
  theta_risk_premium: 0.30

data:
  price_staleness_days: 1
  fundamental_staleness_days: 90
  macro_staleness_days: 7
  trends_staleness_days: 7
  fx_staleness_days: 1
  lookback_prices_days: 756     # ~3 years for vol/correlation calcs
  price_history_years: 5        # initial fetch on first run

macro:
  eu_risk_free_series: "EU_10Y_DE"
  us_risk_free_series: "US_10Y"
  ca_risk_free_series: "CA_10Y"   # Bank of Canada 10Y (FRED: IRLTLT01CAM156N)
  eu_cpi_series: "EU_HICP_YOY"
  eu_ppi_series: "EU_PPI_YOY"
  us_cpi_series: "US_CPI_YOY"
  us_ppi_series: "US_PPI_YOY"

# Sector ETFs used for crowding correlation calculation
# region|bucket → ETF ticker
sector_etfs:
  EU|grid: "IQQH.DE"
  EU|nuclear: "URA"           # NUKL.SW (.SW) has yfinance timezone bug; URA is same universe
  EU|defense: "NATO.L"
  EU|water: "IQQQ.DE"
  EU|critical_materials: "AIGI.L"
  EU|ai_infra: "XAIX.DE"
  US|grid: "XLI"
  US|nuclear: "URA"
  US|defense: "ITA"
  US|water: "PHO"
  US|critical_materials: "XLB"
  US|ai_infra: "SMH"
  CA|grid: "XLI"
  CA|nuclear: "URA"
  CA|critical_materials: "XBM.TO"
  CA|defense: "ITA"
  CA|water: "PHO"
  CA|ai_infra: "SMH"

# Broad market indices for relative strength calculation
market_indices:
  US: "SPY"
  CA: "EWC"  # iShares MSCI Canada ETF — TSX proxy (was SPY, a US index)
  EU: "EXW1.DE"

fx:
  # FX pairs fetched and stored in fx_rates table (yfinance convention)
  pairs:
    - "EURUSD=X"   # EUR/USD — primary EU↔US capital flow indicator
    - "GBPUSD=X"   # GBP/USD — UK market exposure
    - "USDCHF=X"   # USD/CHF — CHF safe-haven proxy (rising = USD stronger)
    - "USDCAD=X"   # USD/CAD — CA portfolio FX exposure
    - "USDJPY=X"   # USD/JPY — JPY safe-haven proxy (falling = risk-off)

  # USD strength index: normalised [-1, +1]
  # Values beyond ±neutral_band are called 'strengthening' or 'weakening'
  usd_neutral_band: 0.15

  # Safe-haven signal: JPY or CHF 1M log return below this → SAFE_HAVEN_BID flag
  safe_haven_threshold: 0.02    # 2% 1M log return (magnitude)

  # Sector/country flow score magnitude beyond this → labelled "strong" in implications
  flow_strong_threshold: 0.40

reporting:
  output_dir: "reports"
  top_candidates_count: 10
  watch_crowding_threshold: 0.55   # flag for monitoring before exit threshold
