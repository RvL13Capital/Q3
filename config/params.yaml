kelly:
  fraction: 0.25          # fractional Kelly multiplier
  max_position: 0.08      # 8% hard cap per stock
  max_bucket: 0.35        # 35% hard cap per megatrend bucket
  min_position: 0.02      # skip if Kelly weight < 2%
  cash_reserve: 0.10      # always keep at least 10% cash

signals:
  weights:
    physical: 0.40
    quality:  0.35
    crowding: 0.25        # inverted: low crowding adds to composite

  entry_threshold: 0.55   # composite must exceed this to trigger entry
  crowding_entry_max: 0.40   # only enter if crowding < this
  crowding_exit_threshold: 0.75   # exit if crowding rises above this
  quality_exit_threshold: 0.25    # exit if quality falls below this
  composite_decay_pct: 0.20       # exit if composite decays > 20% from entry value

  crowding:
    etf_corr_window: 60          # rolling days for ETF correlation
    etf_corr_weight: 0.35
    short_interest_weight: 0.15
    rel_strength_weight: 0.30
    trends_weight: 0.20
    rel_strength_window: 126     # 6-month relative strength

  quality:
    roic_wacc_spread_min: -0.10  # normalized to 0 below this
    roic_wacc_spread_max: +0.20  # normalized to 1 above this
    margin_snr_min: 2.0
    margin_snr_max: 10.0
    convexity_min: -0.05
    convexity_max: +0.10
    lookback_years: 5

return_estimation:
  equity_risk_premium: 0.05   # added on top of regional risk-free rate
  # composite score → excess return above rf (linear interpolation)
  composite_anchors:
    - [0.55, 0.06]   # entry threshold → 6% above rf
    - [0.70, 0.12]
    - [0.85, 0.20]
    - [1.00, 0.30]

data:
  price_staleness_days: 1
  fundamental_staleness_days: 90
  macro_staleness_days: 7
  trends_staleness_days: 7
  lookback_prices_days: 756     # ~3 years for vol/correlation calcs
  price_history_years: 5        # initial fetch on first run

macro:
  eu_risk_free_series: "EU_10Y_DE"
  us_risk_free_series: "US_10Y"
  ca_risk_free_series: "US_10Y"   # proxy
  eu_cpi_series: "EU_HICP_YOY"
  eu_ppi_series: "EU_PPI_YOY"
  us_cpi_series: "US_CPI_YOY"
  us_ppi_series: "US_PPI_YOY"

# Sector ETFs used for crowding correlation calculation
# region|bucket → ETF ticker
sector_etfs:
  EU|grid: "IQQH.DE"
  EU|nuclear: "NUKL.SW"
  EU|defense: "DFEN.L"
  EU|water: "IQQQ.DE"
  EU|critical_materials: "AIGI.L"
  EU|ai_infra: "XAIX.DE"
  US|grid: "XLI"
  US|nuclear: "URA"
  US|defense: "ITA"
  US|water: "PHO"
  US|critical_materials: "XLB"
  US|ai_infra: "SMH"
  CA|grid: "XLI"
  CA|nuclear: "URA"
  CA|critical_materials: "XBM.TO"
  CA|defense: "ITA"

# Broad market indices for relative strength calculation
market_indices:
  US: "SPY"
  CA: "SPY"
  EU: "EXW1.DE"

reporting:
  output_dir: "reports"
  top_candidates_count: 10
  watch_crowding_threshold: 0.55   # flag for monitoring before exit threshold
